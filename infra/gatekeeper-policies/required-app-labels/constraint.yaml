apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredLabels
metadata:
  name: deployments-must-have-app-labels
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    namespaces:
      - applications
  parameters:
    message: "All Deployments in `applications` must carry `owner`, `env`, `app.kubernetes.io/name`, and `cost-center` labels."
    labels:
      - key: owner
      - key: env
        allowedRegex: "^(dev|staging|prod)$"
      - key: app.kubernetes.io/name
      - key: cost-center
        allowedRegex: "^.+$"