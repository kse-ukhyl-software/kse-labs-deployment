# Runtime configuration for the image-policy-provider Cosign verifier.
#
# The provider Deployment (deployment.yaml) reads this ConfigMap via
# `envFrom`. Edit values here (or
# `kubectl edit configmap -n image-policy-provider image-policy-provider-config`)
# to change which images the verifier accepts and which signer it
# trusts -- no provider rebuild needed, just `kubectl rollout restart
# deploy/image-policy-provider` afterwards.
#
# Note: this Application has ArgoCD `selfHeal: true` like the rest of
# infra. Live `kubectl edit` works for short experiments, but ArgoCD
# will reconcile back to the values committed here within a few minutes.
# For persistent changes, edit this file in git.
apiVersion: v1
kind: ConfigMap
metadata:
  name: image-policy-provider-config
  namespace: image-policy-provider
  annotations:
    description: "Runtime config for the Cosign verifier (ALLOWED_REGISTRIES, COSIGN_*, LOG_*)."
data:
  ALLOWED_REGISTRIES: ["ghcr.io/oleksii-stepanyk", "ghcr.io/kse-ukhyl-software"]
  COSIGN_KEY_PATH: ""
  COSIGN_IDENTITY: "https://github.com/Oleksii-Stepanyk/image-sig-demo/.github/workflows/build-and-sign.yml@refs/heads/main"
  COSIGN_OIDC_ISSUER: "https://token.actions.githubusercontent.com"
  LOG_LEVEL: "INFO"
  LOG_BODIES: "true"
