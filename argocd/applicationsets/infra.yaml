apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/kse-ukhy-software/kse-labs-deployment.git
        revision: main
        directories:
          - path: infra/*
          # Helm-charted infra apps. Their manifests live under
          # templates/ (which we'd otherwise have to scan, and that
          # breaks the directory walker). They are managed as
          # stand-alone Applications -- see argocd/applications/.
          - path: infra/gatekeeper
            exclude: true
          - path: infra/gatekeeper-policy-manager
            exclude: true
  template:
    metadata:
      name: 'infra-{{path.basename}}'
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
    spec:
      project: infra
      source:
        repoURL: https://github.com/kse-ukhyl-software/kse-labs-deployment.git
        targetRevision: main
        path: '{{path}}'
        directory:
          # Recurse through subdirectories so apps can organize their
          # YAMLs into per-topic folders (e.g. gatekeeper-policies
          # groups related files into read-only-root-fs/, etc.).
          # Helm-charted apps live under argocd/applications/ instead.
          recurse: true
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 5m
        syncOptions:
          - CreateNamespace=true
